name: Lint and Scan
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Install modules
        run: yarn install --frozen-lockfile
      - name: Run ESLint
        run: yarn lint

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Run audit gate
        # scripts/audit.mjs runs `yarn audit --groups dependencies --json`,
        # applies the same high|critical severity policy as the previous inline
        # bitmask wrapper, and additionally supports per-advisory suppression
        # with review-date expiry warnings via .supply-chain/audit-allowlist.json.
        # No `yarn install` — yarn audit reads yarn.lock directly; the gate that
        # detects compromised postinstalls must not run postinstalls itself.
        # See SUPPLY-CHAIN-SECURITY.md §5.
        run: yarn audit:prod

  lockfile-lint:
    name: Lockfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Install modules
        run: yarn install --frozen-lockfile
      - name: Validate yarn.lock registry URLs and integrity
        run: yarn lint:lockfile

  install-hooks:
    name: Install-hook diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Install (ignore lifecycle scripts)
        # --ignore-scripts here is for the diff step only: the install-hook gate
        # must never execute the postinstall scripts it is auditing. This is
        # independent of repo policy — we deliberately do NOT set a global
        # ignore-scripts (see .yarnrc / SUPPLY-CHAIN-SECURITY.md §6).
        run: yarn install --frozen-lockfile --ignore-scripts
      - name: Diff install-hook surface against allowlist
        run: yarn audit:install-hooks

  license-check:
    name: License allowlist gate
    # License allowlist gate (PARANOID):
    # every production dependency's license must be on the allowlist in
    # .supply-chain/license-allowlist.json, or be a reasoned exemption.
    # NON-BLOCKING PILOT: deliberately NOT in `all-checks-passed.needs` below, so
    # it reports without gating merges. Promote to required by adding it to that
    # `needs:` array (+ branch protection). See .plans/license-check-gate.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Install modules
        run: yarn install --frozen-lockfile
      - name: Check production dependency licenses
        run: yarn license-check

  all-checks-passed:
    # Single aggregate gate for branch protection. Keep this job's `needs`
    # list in sync with every mandatory job above — branch protection requires
    # only this context, so adding/removing a mandatory job is a workflow
    # edit, not a branch-protection edit.
    name: All checks passed
    # secret-scan (gitleaks) runs in its own workflow (.github/workflows/secret-scan.yml)
    # and is a separate required status for branch protection — not aggregated here.
    needs: [build, audit, lockfile-lint, install-hooks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all dependencies succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required jobs did not succeed"
            exit 1
          fi
