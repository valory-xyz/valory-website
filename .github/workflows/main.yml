name: Lint and Scan
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.20.2'
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Install modules
        run: yarn install --frozen-lockfile
      - name: Run ESLint
        run: yarn lint

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.20.2'
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Run yarn audit (fail on high/critical, production deps only)
        # Yarn 1.x `yarn audit` exit code is a severity bitmask, not a --level
        # comparison: 1=info, 2=low, 4=moderate, 8=high, 16=critical. Mask
        # against 24 (8|16) to fail only on high or critical findings.
        # See SUPPLY-CHAIN-SECURITY.md §5.
        run: |
          yarn audit --groups dependencies; CODE=$?
          if [ $((CODE & 24)) -ne 0 ]; then
            echo "::error::High or critical advisory found (exit code $CODE)"
            exit 1
          fi
          echo "No high/critical advisories (exit code $CODE indicates low/moderate/info only, ignored by policy)"

  lockfile-lint:
    name: Lockfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.20.2'
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Install modules
        run: yarn install --frozen-lockfile
      - name: Validate yarn.lock registry URLs and integrity
        run: yarn lint:lockfile
