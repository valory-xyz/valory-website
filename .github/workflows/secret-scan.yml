name: Secret scan (gitleaks)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        # Direct binary install rather than `gitleaks/gitleaks-action` because
        # the action requires a paid license for organisation-owned repos
        # (https://github.com/gitleaks/gitleaks-action#-announcement). The
        # underlying gitleaks CLI is OSS — checksum-verified against the
        # upstream-published checksum at release time. Bump VERSION + SHA256
        # together (the SHA is version-specific).
        env:
          VERSION: 8.30.1
          SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/
          rm gitleaks gitleaks.tar.gz
          gitleaks version
      - name: Run gitleaks (redact, full history)
        run: gitleaks detect --no-banner --redact --verbose
